<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blog</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: #e6e6e6;
  }

  /* TOP NAV */
  nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 18px;
    position: sticky;
    top: 0;
    background: rgba(15, 17, 21, 0.95);
    border-bottom: 1px solid #1f2430;
  }

  nav a {
    color: #cfd6e1;
    text-decoration: none;
    font-size: 14px;
  }

  nav a:hover {
    color: #7aa2ff;
  }

  /* MAIN CONTAINER */
  .container {
    max-width: 850px;
    margin: 50px auto;
    padding: 0 20px;
  }

  h1 {
    font-size: 32px;
    margin-bottom: 10px;
  }

  .subtitle {
    color: #9aa4b2;
    margin-bottom: 35px;
  }

  /* BLOG POSTS */
  .post {
    background: #151922;
    border: 1px solid #222838;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 18px;
    transition: 0.2s;
  }

  .post:hover {
    border-color: #7aa2ff;
  }

  .post h2 {
    margin-top: 0;
    margin-bottom: 8px;
    font-size: 20px;
  }

  .date {
    font-size: 12px;
    color: #7aa2ff;
    margin-bottom: 12px;
  }

  .post p {
    color: #aab2c0;
    line-height: 1.6;
    font-size: 14px;
  }

  /* BACK LINK */
  .back {
    display: inline-block;
    margin-bottom: 25px;
    color: #7aa2ff;
    text-decoration: none;
    font-size: 14px;
  }

  .back:hover {
    color: white;
  }

  /* OPTIONAL TAGS */
  .tag {
    display: inline-block;
    margin-top: 12px;
    margin-right: 6px;
    padding: 4px 8px;
    background: #1d2432;
    border-radius: 6px;
    font-size: 11px;
    color: #9fb9ff;
  }
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="index.html">home</a>
  <a href="projects.html">projects</a>
  <a href="press.html">press</a>
  <a href="reading.html">reading</a>

</nav>

<div class="container">

  <a class="back" href="index.html">← back to home</a>

  <h1>Blog</h1>
  <p class="subtitle">
    I have a lot of thoughts. Feel free to take a peek!
  </p>

  <!-- POST 1 -->
  <div class="post">
    <h2>Ok not that many thoughts come back later lol</h2>

    <div class="date">May 10th 2026</div>

    <p>
      I'll update this later maybe
    </p>

    <div class="tag">thoughts</div>
    <div class="tag">random</div>
  </div>


</div>

</body>

</html>
